# Hyprlock — Gruvbox Dark

source = ~/.config/hypr/hyprlock-colors.conf

general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = false
    immediate_render = true
}

background {
    monitor =
    path = /home/null/Downloads/wallpaper.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# Time (big)
label {
    monitor =
    text = $TIME
    color = $fg
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = $fg
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.5
    dots_center = true
    outer_color = $yellow
    inner_color = $bg
    font_color = $fg
    fade_on_empty = true
    placeholder_text = <i>Enter password...</i>
    hide_input = false
    check_color = $green
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $aqua
    position = 0, -80
    halign = center
    valign = center
}

# Current keyboard layout
label {
    monitor =
    text = cmd[update:1000] mmsg get keyboardlayout 2>/dev/null | sed -n 's/.*"layout":"\\([^"]*\\)".*/\\1/p' | sed 's/English (US)/us/; s/Russian/ru/; s/ //g'
    color = $fg
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}
