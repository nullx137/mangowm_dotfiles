# MangoWM config — Gruvbox Dark edition
# More options: https://github.com/DreamMaoMao/mango/wiki/

# ---------------------------------------------------------------------------
# Window effects
# ---------------------------------------------------------------------------
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

shadows=0
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# ---------------------------------------------------------------------------
# Animation Configuration (types: zoom, slide)
# ---------------------------------------------------------------------------
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# ---------------------------------------------------------------------------
# Scroller Layout Setting
# ---------------------------------------------------------------------------
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# ---------------------------------------------------------------------------
# Master-Stack Layout Setting
# ---------------------------------------------------------------------------
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# ---------------------------------------------------------------------------
# Dwindle Layout Setting
# ---------------------------------------------------------------------------
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# ---------------------------------------------------------------------------
# Overview Setting
# ---------------------------------------------------------------------------
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# ---------------------------------------------------------------------------
# Keyboard / input
# ---------------------------------------------------------------------------
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us,ru
xkb_rules_options=grp:alt_shift_toggle

# Trackpad
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# Mouse
mouse_natural_scrolling=0

# ---------------------------------------------------------------------------
# Appearance — Gruvbox Dark
# ---------------------------------------------------------------------------
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4

rootcolor=0x282828ff
bordercolor=0x665c54ff
dropcolor=0x689d6a55
splitcolor=0xfe8019ff
focuscolor=0xfabd2fff
maximizescreencolor=0xb8bb26ff
urgentcolor=0xfb4934ff
scratchpadcolor=0x83a598ff
globalcolor=0xd3869bff
overlaycolor=0x8ec07cff

# ---------------------------------------------------------------------------
# Layout rules
# ---------------------------------------------------------------------------
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ---------------------------------------------------------------------------
# Autostart — import environment, daemons, UI helpers
# ---------------------------------------------------------------------------
# Import environment variables into the systemd user session so graphical
# apps (pi, helium, etc.) and user services (hyprlock) can access WAYLAND_DISPLAY and PATH.
exec-once=/bin/bash -c 'systemctl --user import-environment'

exec-once=mkdir -p ~/Pictures/Screenshots
exec-once=waybar

# Wallpaper
exec-once=swaybg -m fill -i /home/null/Downloads/wallpaper.jpg

# Touchpad gestures (requires libinput-gestures + wtype, user in 'input' group)
exec-once=bash -c 'sleep 2; libinput-gestures-setup start'

# Optional: install and enable these helpers for a complete desktop:
#   - notification daemon:  pacman -S mako   (or dunst/fnott/swaync)
#   - polkit auth agent:    pacman -S polkit-gnome
# exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec-once=mako

# ---------------------------------------------------------------------------
# Key Bindings
# ---------------------------------------------------------------------------

# Reload config
bind=SUPER,r,reload_config

# Terminal, launcher, browser and apps
bind=SUPER,Return,spawn,foot
bind=SUPER,d,spawn,fuzzel
bind=SUPER,b,spawn,helium
bind=SUPER,o,spawn,obsidian
bind=SUPER,a,spawn,AmneziaVPN
bind=SUPER,m,spawn,AyuGram
bind=SUPER+SHIFT,h,spawn, hermes desktop

# Exit / lock / suspend / kill
bind=SUPER+SHIFT,e,quit
bind=SUPER+SHIFT,l,spawn,hyprlock
bind=SUPER+SHIFT,s,spawn,systemctl suspend
bind=SUPER,q,killclient,

# Switch window focus
bind=SUPER,Tab,toggleoverview,
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev
bind=SUPER,Right,focusstack,next
bind=SUPER,Left,focusstack,prev

# Master-Stack layout tuning
bind=SUPER,bracketleft,incnmaster,1
bind=SUPER,bracketright,incnmaster,-1
bind=SUPER,h,setmfact,-0.05
bind=SUPER,l,setmfact,0.05

# Swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# Window status
bind=SUPER,g,toggleglobal,
bind=ALT+Tab,focusstack,next
bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# Scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

# Dwindle layout (manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# Switch layout
bind=SUPER,n,switch_layout
bind=SUPER+SHIFT,space,setlayout,0

# Tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# Gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# Move floating window
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# Resize floating window
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# OSD server
exec-once=swayosd-server

# Multimedia keys (F-keys, no modifier) with OSD
bind=NONE,F1,spawn,swayosd-client --output-volume mute
bind=NONE,F2,spawn,swayosd-client --output-volume lower
bind=NONE,F3,spawn,swayosd-client --output-volume raise
bind=NONE,F5,spawn,swayosd-client --brightness lower
bind=NONE,F6,spawn,swayosd-client --brightness raise

# Legacy media keys (keep for compatibility) with OSD
bind=NONE,F8,spawn,swayosd-client --output-volume lower
bind=NONE,F9,spawn,swayosd-client --output-volume raise
bind=NONE,F10,spawn,swayosd-client --output-volume mute

# Dedicated media/brightness keys with OSD
bind=NONE,XF86XK_AudioMute,spawn,swayosd-client --output-volume mute
bind=NONE,XF86XK_AudioLowerVolume,spawn,swayosd-client --output-volume lower
bind=NONE,XF86XK_AudioRaiseVolume,spawn,swayosd-client --output-volume raise
bind=NONE,XF86XK_MonBrightnessUp,spawn,swayosd-client --brightness raise
bind=NONE,XF86XK_MonBrightnessDown,spawn,swayosd-client --brightness lower

# Screenshots (Wayland-native)
bind=NONE,Print,spawn,grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind=SHIFT,Print,spawn,grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png

# Mouse bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Layer rules
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
